__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/dfine_hgnetv2.yml',
]

epochs: 160
warmup_epochs: 10
use_amp: True
seed: 42
# 每 5 轮验证一次，避免每轮训练后都长时间卡在验证阶段。
eval_freq: 5
skip_initial_eval: True
eval_hbb: False
eval_obb: True
primary_metric: obb_mAP50
eval_obb_max_dets: 100
eval_obb_score_thr: 0.001
# 保留 160 轮作为训练上限，80 轮后若连续 8 次验证无明显提升则提前停止。
early_stop_start_epoch: 80
early_stop_patience: 8
early_stop_min_delta: 0.001

num_classes: 5
remap_mscoco_category: True
output_dir: ./output/dfine_s_dronevehicle_obb_fusion
eval_spatial_size: [640, 640]

DFINE:
  backbone: HGNetv2
  decoder: DFINETransformer

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

HybridEncoder:
  in_channels: [256, 512, 1024]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  use_encoder_idx: [2]
  dim_feedforward: 1024
  expansion: 0.5
  depth_mult: 0.34

DFINETransformer:
  num_classes: 5
  hidden_dim: 256
  num_queries: 300
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  num_levels: 3
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.0
  activation: relu
  eval_idx: -1
  aux_loss: True
  learn_query_content: False
  query_select_method: default
  num_denoising: 0
  num_bins: 16

DFINECriterion:
  riou_mode: gwd
  weight_dict:
    loss_vfl: 2.0
    loss_bbox: 5.0
    loss_riou: 2.0
    loss_fgl: 0.0
  losses: ['labels', 'rboxes']
  num_bins: 16
  # Inverse-sqrt frequency weights for DroneVehicle class imbalance.
  # Order: car, truck, bus, freight car, van  (matches category_id 1-5).
  # Raw inv-sqrt: 1.08, 4.52, 5.13, 5.77, 6.09 → normalised by mean (4.52).
  class_weights: [0.24, 1.00, 1.14, 1.28, 1.35]

train_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/train/trainimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_train.json
    return_masks: False
    transforms:
      ops:
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: Normalize, mean: [0.485, 0.456, 0.406, 0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225, 0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: cxcywh, normalize: True}
  shuffle: True
  total_batch_size: 12
  num_workers: 12
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4
  collate_fn:
    base_size: 640
    base_size_repeat: 3
    stop_epoch: 150

val_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/val/valimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_val.json
    transforms:
      ops:
        - {type: Resize, size: [640, 640]}
        - {type: Normalize, mean: [0.485, 0.456, 0.406, 0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225, 0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: cxcywh, normalize: True}
  shuffle: False
  total_batch_size: 8
  num_workers: 8
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4

optimizer:
  type: AdamW
  params:
    - {params: '^(?=.*backbone)(?!.*norm|bn).*$', lr: 0.00004}
    - {params: '^(?=.*(?:fusion_layers|glsa|illum_extract|alignment|rgb_enhance|ir_enhance|scale_gate)).*$', lr: 0.0004}
    - {params: '^(?=.*(?:encoder|decoder))(?!.*(?:norm|bn|bias)).*$', lr: 0.0002}
  weight_decay: 0.0001

lr_scheduler:
  type: MultiStepLR
  milestones: [120, 150]
  gamma: 0.1
