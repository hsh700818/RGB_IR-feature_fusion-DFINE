__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/dfine_hgnetv2.yml',
]

epochs: 160
warmup_epochs: 10
use_amp: True
seed: 42

num_classes: 5
remap_mscoco_category: True
output_dir: ./output/dfine_s_dronevehicle_obb_fusion

DFINE:
  backbone: HGNetv2
  decoder: DFINETransformer

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

HybridEncoder:
  in_channels: [256, 512, 1024]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  use_encoder_idx: [2]
  dim_feedforward: 1024
  expansion: 0.5
  depth_mult: 0.34

DFINETransformer:
  num_classes: 5
  hidden_dim: 256
  num_queries: 300
  # HybridEncoder 输出 3 个 256 通道特征图，因此 decoder 输入通道也必须设为 [256, 256, 256]
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  num_levels: 3
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.0
  activation: relu
  eval_idx: -1
  aux_loss: True
  learn_query_content: False
  query_select_method: default
  # 当前阶段先关闭 denoising，避免原始 4 维 DN box 与 5 维 OBB target 不兼容
  num_denoising: 0
  num_bins: 16

# 当前版本已恢复多尺度 transformer decoder，并加入 angle head。
# loss_riou 和 loss_fgl 仍保持关闭，因为 rotated_iou 与 ADR target 还需要后续替换为真实实现。
DFINECriterion:
  weight_dict:
    loss_vfl: 2.0
    loss_bbox: 5.0
    loss_riou: 0.0
    loss_fgl: 0.0
  losses: ['labels', 'rboxes']
  num_bins: 16

train_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/train/trainimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_train.json
    return_masks: False
    transforms:
      ops:
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: Normalize, mean: [0.485, 0.456, 0.406, 0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225, 0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: cxcywh, normalize: True}
  shuffle: True
  total_batch_size: 16
  num_workers: 8
  collate_fn:
    stop_epoch: 150

val_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/val/valimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_val.json
  shuffle: False
  total_batch_size: 1
  num_workers: 4

optimizer:
  type: AdamW
  params:
    - {params: '^(?=.*backbone)(?!.*norm|bn).*$', lr: 0.00004}
    - {params: '^(?=.*(?:fusion_layers|glsa|illum_extract)).*$', lr: 0.0004}
    - {params: '^(?=.*(?:encoder|decoder))(?!.*(?:norm|bn|bias)).*$', lr: 0.0002}
  weight_decay: 0.0001

lr_scheduler:
  type: MultiStepLR
  milestones: [120, 150]
  gamma: 0.1
