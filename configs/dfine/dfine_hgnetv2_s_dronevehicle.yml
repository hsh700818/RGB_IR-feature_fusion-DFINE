__include__: [
  '../dataset/coco_detection.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/dfine_hgnetv2.yml',
]

# 0. 全局训练控制
epochs: 160
warmup_epochs: 10
use_amp: True
seed: 42

# 1. 任务定义
num_classes: 5
remap_mscoco_category: True
output_dir: ./output/dfine_s_dronevehicle_obb_fusion

# 2. 架构缩放，S 版本，3 个尺度，通道 256
DFINE:
  backbone: HGNetv2
  decoder: DFINETransformer

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

HybridEncoder:
  in_channels: [256, 512, 1024]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  use_encoder_idx: [2]
  dim_feedforward: 1024
  expansion: 0.5
  depth_mult: 0.34

DFINETransformer:
  num_layers: 6
  hidden_dim: 256
  num_bins: 16
  eval_idx: -1
  num_points: [4, 4, 4]

# 3. 当前阶段只启用有效监督
# 注意：当前 box_ops.py 中 rotated_iou 仍是占位实现，rbox_to_adr_target 仍是随机目标。
# 因此先关闭 loss_riou 与 loss_fgl，避免无效损失误导训练日志。
DFINECriterion:
  weight_dict:
    loss_vfl: 2.0
    loss_bbox: 5.0
    loss_riou: 0.0
    loss_fgl: 0.0
  losses: ['labels', 'rboxes']
  num_bins: 16

# 4. 数据加载，DroneVehicle RGB-IR 6 通道输入
train_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/train/trainimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_train.json
    return_masks: False
    transforms:
      ops:
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: Normalize, mean: [0.485, 0.456, 0.406, 0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225, 0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: cxcywh, normalize: True}
  shuffle: True
  # RTX 4090 24GB 上当前模型只占约 6 到 7GB，可先提高到 16；若显存仍充足再尝试 24 或 32。
  total_batch_size: 16
  num_workers: 8
  collate_fn:
    stop_epoch: 150

val_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/val/valimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_val.json
  shuffle: False
  total_batch_size: 1
  num_workers: 4

# 5. 优化器与学习率策略
optimizer:
  type: AdamW
  params:
    - {params: '^(?=.*backbone)(?!.*norm|bn).*$', lr: 0.00004}
    - {params: '^(?=.*(?:fusion_layers|glsa|illum_extract)).*$', lr: 0.0004}
    - {params: '^(?=.*(?:encoder|decoder))(?!.*(?:norm|bn|bias)).*$', lr: 0.0002}
  weight_decay: 0.0001

lr_scheduler:
  type: MultiStepLR
  milestones: [120, 150]
  gamma: 0.1
