__include__: [
  '../../dataset/coco_detection.yml',
  '../../runtime.yml',
  '../include/dataloader.yml',
  '../include/optimizer.yml',
  '../include/dfine_hgnetv2.yml',
]

# Ablation B: AAF + CMI — adds cross-modal interaction on top of alignment.
# No illumination weighting, no GLSA.

epochs: 160
warmup_epochs: 10
use_amp: True
seed: 42
eval_freq: 5
skip_initial_eval: True
eval_hbb: False
eval_obb: True
primary_metric: obb_mAP50
eval_obb_max_dets: 100
eval_obb_score_thr: 0.001

num_classes: 5
remap_mscoco_category: True
output_dir: ./output/ablation_aaf_cmi

DFINE:
  backbone: HGNetv2
  decoder: DFINETransformer
  fusion_use_cmi: True
  fusion_use_illum: False
  fusion_use_glsa: False

HGNetv2:
  name: 'B0'
  return_idx: [1, 2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

HybridEncoder:
  in_channels: [256, 512, 1024]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  use_encoder_idx: [2]
  dim_feedforward: 1024
  expansion: 0.5
  depth_mult: 0.34

DFINETransformer:
  num_classes: 5
  hidden_dim: 256
  num_queries: 300
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  num_levels: 3
  nhead: 8
  num_layers: 6
  dim_feedforward: 1024
  dropout: 0.0
  activation: relu
  eval_idx: -1
  aux_loss: True
  learn_query_content: False
  query_select_method: default
  num_denoising: 0
  num_bins: 16

DFINECriterion:
  riou_mode: gwd
  weight_dict:
    loss_vfl: 2.0
    loss_bbox: 5.0
    loss_riou: 2.0
    loss_fgl: 0.0
  losses: ['labels', 'rboxes']
  num_bins: 16

train_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/train/trainimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_train.json
    return_masks: False
    transforms:
      ops:
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [640, 640]}
        - {type: Normalize, mean: [0.485, 0.456, 0.406, 0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225, 0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: cxcywh, normalize: True}
  shuffle: True
  total_batch_size: 16
  num_workers: 12
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4
  collate_fn:
    stop_epoch: 150

val_dataloader:
  dataset:
    img_folder: /root/autodl-tmp/DroneVehicle/val/valimg
    ann_file: /root/autodl-tmp/DroneVehicle/instances_val.json
  shuffle: False
  total_batch_size: 16
  num_workers: 8
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 4

optimizer:
  type: AdamW
  params:
    - {params: '^(?=.*backbone)(?!.*norm|bn).*$', lr: 0.00004}
    - {params: '^(?=.*(?:fusion_layers|glsa|alignment|rgb_enhance|ir_enhance)).*$', lr: 0.0004}
    - {params: '^(?=.*(?:encoder|decoder))(?!.*(?:norm|bn|bias)).*$', lr: 0.0002}
  weight_decay: 0.0001

lr_scheduler:
  type: MultiStepLR
  milestones: [120, 150]
  gamma: 0.1
